version: '3.9'

# ═══════════════════════════════════════════════════════════════════
# Dev@Deakin Codex — DEVELOPMENT docker-compose
# Usage: docker-compose up -d
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: USERNAME/codex-backend:dev
    container_name: codex-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STRIPE_SECRET: ${STRIPE_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CLIENT_URL: http://localhost
      BACKEND_URL: http://localhost:5000
      ADMIN_KEY: ${BACKEND_ADMIN_KEY}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      HEALTH_CHECK_INTERVAL_MS: 30000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - codex-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:5000
    image: USERNAME/codex-frontend:dev
    container_name: codex-frontend-dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codex-net

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codex-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - codex-net

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codex-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-codex-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_HTTP_PORT: 3001
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - codex-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  codex-net:
    driver: bridge
