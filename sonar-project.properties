# ═══════════════════════════════════════════════════════════════════
# SonarCloud Configuration — Dev@Deakin Codex
# ═══════════════════════════════════════════════════════════════════

# ── Project Identity ─────────────────────────────────────────────
sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.organization=YOUR_SONAR_ORG
sonar.projectName=Dev@Deakin Codex
sonar.projectVersion=1.0

# ── Source Paths ─────────────────────────────────────────────────
sonar.sources=backend,frontend/src

# ── Exclusions ───────────────────────────────────────────────────
sonar.exclusions=\
    **/node_modules/**,\
    **/coverage/**,\
    **/dist/**,\
    **/build/**,\
    **/*.test.js,\
    **/*.test.jsx,\
    **/*.spec.js,\
    **/tests/**,\
    frontend/src/tests/**,\
    **/jest.config.js,\
    **/babel.config.js

# ── Test Source Paths ─────────────────────────────────────────────
sonar.tests=backend/tests,frontend/src/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# ── Coverage Reports ──────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# ── Language ──────────────────────────────────────────────────────
sonar.language=js

# ── Quality Gate Settings ─────────────────────────────────────────
# Enforces these via SonarCloud project settings (Quality Gate):
# - Coverage >= 60%
# - Duplications <= 3%
# - Code smells: A rating
# - Reliability: A rating
# - Security: A rating

# ── Encoding ─────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Host (SonarCloud — do NOT change) ────────────────────────────
sonar.host.url=https://sonarcloud.io
